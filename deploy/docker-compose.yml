# Self-host CodePulse: server + PostgreSQL. From the repo root:
#   docker compose -f deploy/docker-compose.yml up --build
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: codepulse
      POSTGRES_PASSWORD: codepulse
      POSTGRES_DB: codepulse
    ports:
      - "5432:5432"
    volumes:
      - codepulse-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codepulse"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://codepulse:codepulse@postgres:5432/codepulse?sslmode=disable"
    command: ["-addr", ":8080"]
    ports:
      - "8080:8080"

volumes:
  codepulse-pg:
