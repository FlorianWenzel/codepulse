name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: Go build, test & self-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Self-scan (dogfood; fail the build on CRITICAL+ findings)
        run: |
          go build -o bin/codepulse-scan ./cmd/codepulse-scan
          ./bin/codepulse-scan -fail-on CRITICAL -exclude testdata,web .

  web:
    name: Dashboard test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: cd web && npm ci
      - name: Test
        run: cd web && npm run test
      - name: Build
        run: cd web && npm run build

  action:
    name: Dogfood the scan action
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run CodePulse action (local quality gate)
        uses: ./
        with:
          path: .
          args: "-exclude testdata,web"
          fail-on: CRITICAL
